version: '3.8'

services:
  api:
    build: .
    container_name: structural-ai-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - USE_GPU=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
